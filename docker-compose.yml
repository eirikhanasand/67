services:
  minecraft:
    image: itzg/minecraft-server
    container_name: "67"
    mem_limit: 6g
    cpus: "2.0"
    ports:
      - "${PORT:-5000}:25565"
    environment:
      EULA: "TRUE"
      TYPE: "PURPUR"
      VERSION: "1.21.11"
      MEMORY: "6G"
      ENABLE_RCON: "true"
      RCON_PASSWORD: ${RCON_PASSWORD}
    volumes:
      - ./data:/data
    restart: unless-stopped
